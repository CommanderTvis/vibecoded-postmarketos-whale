<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<fontconfig>
  <!--
    Replace U+1F433 SPOUTING WHALE (🐳) with the Apple version.

    "Apple Whale Override" is a colour font that contains ONLY that one glyph.
    By preferring it ahead of every other family, any text run containing the
    whale picks it up first; because the font has no other glyph, all other
    characters (and all other emoji) fall straight through to the next font in
    the list — normally Noto Color Emoji.
  -->

  <!-- Make sure the override font is discoverable by name. -->
  <match target="scan">
    <test name="family"><string>Apple Whale Override</string></test>
    <edit name="scalable" mode="assign"><bool>true</bool></edit>
  </match>

  <!-- Prepend our font to the generic 'emoji' family. -->
  <match target="pattern">
    <test name="family"><string>emoji</string></test>
    <edit name="family" mode="prepend" binding="strong">
      <string>Apple Whale Override</string>
    </edit>
  </match>

  <!-- Many apps shape emoji inside a sans-serif/serif/monospace run, relying
       on fallback.  Append the whale font there too so it is consulted before
       the system emoji fallback (Noto) for codepoints it actually has. -->
  <match target="pattern">
    <test name="family"><string>sans-serif</string></test>
    <edit name="family" mode="prepend" binding="weak">
      <string>Apple Whale Override</string>
    </edit>
  </match>
  <match target="pattern">
    <test name="family"><string>serif</string></test>
    <edit name="family" mode="prepend" binding="weak">
      <string>Apple Whale Override</string>
    </edit>
  </match>
  <match target="pattern">
    <test name="family"><string>monospace</string></test>
    <edit name="family" mode="prepend" binding="weak">
      <string>Apple Whale Override</string>
    </edit>
  </match>

  <!-- And put it ahead of Noto Color Emoji explicitly, for apps that request
       the emoji font by its real name. -->
  <alias binding="strong">
    <family>Noto Color Emoji</family>
    <prefer><family>Apple Whale Override</family></prefer>
  </alias>
</fontconfig>
